global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'spring-microservices'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
        - gateway:8090
        - alert-service:8081
        - user-service:8082
        - patient-service:8084
        - product-service:8084
        - profile-service:8085
        - stock-service:8095
        - intervention-service:8086
        - conversation-service:8088
        - sensorsimulator:8089
        - autonomy-service:8097
        - cognitive-assessment:8098
