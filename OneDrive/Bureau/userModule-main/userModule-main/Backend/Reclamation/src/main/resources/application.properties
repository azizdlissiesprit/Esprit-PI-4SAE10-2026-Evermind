spring.application.name=Reclamation

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/Reclamation
spring.datasource.username=postgres
spring.datasource.password=123456789
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8083

# Eureka Configuration
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# CORS Configuration
app.cors.allowed-origin=http://localhost:4200

# JWT Configuration
app.jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

# Attachment Configuration
app.attachments.upload-dir=uploads/reclamations
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
