<div class="page-wrapper">
  <div class="main-container">
    <!-- Left Section (Image) -->
    <div class="image-section">
      <div class="logo">Alzheimer Care</div>
      <img
        class="bg-img"
        src="https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1740&q=80"
        alt="Medical Background"
      />

      <div class="promo-card">
        <div class="promo-text">
          Create a new<br />
          secure password.
        </div>
      </div>
    </div>

    <!-- Right Section (Form) -->
    <div class="form-section">
      <h1 class="form-title">Reset Password</h1>
      <div class="form-subtitle">Enter your new password below.</div>

      <form [formGroup]="resetPasswordForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="label">New Password</label>
          <input
            type="password"
            class="input-field"
            formControlName="newPassword"
            placeholder="••••••••••"
          />
        </div>

        <div class="form-group">
          <label class="label">Confirm Password</label>
          <input
            type="password"
            class="input-field"
            formControlName="confirmPassword"
            placeholder="••••••••••"
          />
        </div>

        <div
          *ngIf="errorMessage"
          style="
            color: #dc2626;
            background-color: #fee2e2;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
          "
        >
          {{ errorMessage }}
        </div>

        <button class="submit-btn" type="submit" [disabled]="resetPasswordForm.invalid || isLoading || !token">
          {{ isLoading ? 'Resetting...' : 'Reset Password' }}
        </button>

        <p class="login-link">
          Remember your password? <a routerLink="/auth/login">Back to Login</a>
        </p>
      </form>
    </div>
  </div>
</div>
