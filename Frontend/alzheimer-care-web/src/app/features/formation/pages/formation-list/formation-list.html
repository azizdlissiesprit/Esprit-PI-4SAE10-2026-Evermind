<div class="formation-list-container">
  <div class="header">
    <h1>Available Formations</h1>
    <p>Browse and enroll in available training programs</p>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading">
    <div class="spinner"></div>
    <p>Loading formations...</p>
  </div>

  <!-- Error State -->
  <div *ngIf="errorMessage && !isLoading" class="error-message">
    {{ errorMessage }}
  </div>

  <!-- Formations Grid -->
  <div class="formations-grid" *ngIf="!isLoading && formations.length > 0">
    <div *ngFor="let formation of formations" class="formation-card">
      <div class="card-header">
        <h2>{{ formation.titre }}</h2>
        <span class="theme-badge" *ngIf="formation.theme">{{ formation.theme }}</span>
      </div>
      <div class="card-body">
        <p class="description" *ngIf="formation.description">
          {{ formation.description }}
        </p>
        <p class="date" *ngIf="formation.dateCreation">
          Created: {{ formation.dateCreation | date: 'short' }}
        </p>
      </div>
      <div class="card-footer">
        <button class="btn-enroll" [routerLink]="['/app/formation/modules', formation.id]">
          View Modules
        </button>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="!isLoading && formations.length === 0" class="empty-state">
    <p>No formations available at the moment.</p>
  </div>
</div>
