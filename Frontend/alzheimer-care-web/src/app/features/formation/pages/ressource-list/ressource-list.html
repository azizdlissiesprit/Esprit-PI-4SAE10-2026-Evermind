<div class="page-container">
  <header class="top-header">
    <div class="breadcrumbs">Formation &gt; <span>Ressources</span></div>
    <button class="btn-primary" (click)="openAdd()">
      <i class="fa-solid fa-plus"></i> Nouvelle ressource
    </button>
  </header>

  <section class="card-section">
    <h2 class="section-title">Ressources (fichiers, URLs)</h2>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Id</th>
            <th>URL</th>
            <th>Type fichier</th>
            <th>Taille</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let r of items">
            <td>{{ r.id }}</td>
            <td class="url-cell">{{ r.url }}</td>
            <td>{{ r.typeFichier ?? '-' }}</td>
            <td>{{ r.taille ? (r.taille / 1024 | number:'1.0-1') + ' Ko' : '-' }}</td>
            <td>
              <button class="btn-icon" (click)="openEdit(r)" title="Modifier"><i class="fa-solid fa-pen"></i></button>
              <button class="btn-icon danger" (click)="delete(r.id!)" title="Supprimer"><i class="fa-solid fa-trash"></i></button>
            </td>
          </tr>
          <tr *ngIf="items.length === 0">
            <td colspan="5" class="empty">Aucune ressource.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <div class="modal" *ngIf="showForm">
    <div class="modal-content">
      <h3>{{ editing ? 'Modifier' : 'Nouvelle' }} ressource</h3>
      <div class="form-group" *ngIf="!editing">
        <label>Module *</label>
        <select [(ngModel)]="model.moduleId">
          <option [value]="0">-- Sélectionner --</option>
          <option *ngFor="let m of modules" [value]="m.id">{{ m.titre }}</option>
        </select>
      </div>
      <div class="form-group">
        <label>URL *</label>
        <input [(ngModel)]="model.url" type="text" placeholder="URL ou chemin" />
      </div>
      <div class="form-group">
        <label>Type fichier</label>
        <input [(ngModel)]="model.typeFichier" type="text" placeholder="Ex: pdf, mp4" />
      </div>
      <div class="form-group">
        <label>Taille (octets)</label>
        <input [(ngModel)]="model.taille" type="number" min="0" />
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" (click)="cancel()">Annuler</button>
        <button class="btn-primary" (click)="save()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>
