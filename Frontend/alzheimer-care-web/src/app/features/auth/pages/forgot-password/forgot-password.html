<div class="page-wrapper">
  <div class="main-container">
    <!-- Left Section (Image) -->
    <div class="image-section">
      <div class="logo">Alzheimer Care</div>
      <img
        class="bg-img"
        src="https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1740&q=80"
        alt="Medical Background"
      />

      <div class="promo-card">
        <div class="promo-text">
          Secure account<br />
          recovery process.
        </div>
      </div>
    </div>

    <!-- Right Section (Form) -->
    <div class="form-section">
      <h1 class="form-title">Forgot Password</h1>
      <div class="form-subtitle">Enter your email to receive a password reset link.</div>

      <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="label">Email Address</label>
          <input
            type="email"
            class="input-field"
            formControlName="email"
            placeholder="example@mail.com"
          />
        </div>

        <div class="form-group recaptcha-wrap">
          <re-captcha
            formControlName="recaptcha"
            siteKey="6Lc-1dAsAAAAAGWclwnpjtCqcdKhL4N--ZZuiw1a"
          >
          </re-captcha>
        </div>

        <div
          *ngIf="successMessage"
          style="
            color: #059669;
            background-color: #d1fae5;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
          "
        >
          {{ successMessage }}
        </div>

        <div
          *ngIf="errorMessage"
          style="
            color: #dc2626;
            background-color: #fee2e2;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
          "
        >
          {{ errorMessage }}
        </div>

        <button
          class="submit-btn"
          type="submit"
          [disabled]="forgotPasswordForm.invalid || isLoading"
        >
          {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
        </button>

        <p class="login-link">
          Remember your password? <a routerLink="/auth/login">Back to Login</a>
        </p>
      </form>
    </div>
  </div>
</div>
