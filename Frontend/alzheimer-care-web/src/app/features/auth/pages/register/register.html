<div class="page-wrapper">
  <div class="main-container">
    <!-- Left Section (Image) -->
    <div class="image-section">
      <div class="logo">Alzheimer Care</div>
      <img
        class="bg-img"
        src="https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1740&q=80"
        alt="Medical Clinic Background"
      />

      <div class="promo-card">
        <div class="promo-text">
          Join our platform<br />
          for secure patient monitoring.
        </div>
      </div>
    </div>

    <!-- Right Section (Form) -->
    <div class="form-section">
      <!-- Stepper -->
      <div class="stepper">
        <div class="step active">
          <div class="step-circle">1</div>
          Account
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-circle">2</div>
          Confirm
        </div>
      </div>

      <h1 class="form-title">Registration</h1>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <div class="form-row">
          <div class="form-group half">
            <label class="label">First Name</label>
            <input type="text" class="input-field" formControlName="firstName" placeholder="John" />
          </div>

          <div class="form-group half">
            <label class="label">Last Name</label>
            <input type="text" class="input-field" formControlName="lastName" placeholder="Doe" />
          </div>
        </div>

        <div class="form-group">
          <label class="label">Email</label>
          <input type="email" class="input-field" formControlName="email" placeholder="example@mail.com" />
        </div>

        <div class="form-group">
          <label class="label">Password</label>
          <input type="password" class="input-field" formControlName="password" placeholder="••••••••••" />
        </div>

        <div class="form-group">
          <label class="label">Confirm Password</label>
          <input type="password" class="input-field" formControlName="confirmPassword" placeholder="••••••••••" />
        </div>

        <div class="legal-text">
          By clicking "Register", you agree to our Terms of Use and Privacy Policy.
        </div>

        <button class="submit-btn" type="submit" [disabled]="registerForm.invalid || isLoading">
          {{ isLoading ? 'Creating...' : "Register" }}
        </button>

        <p class="login-link">
          Already have an account? <a routerLink="/auth/login">Login</a>
        </p>
      </form>
    </div>
  </div>
</div>
