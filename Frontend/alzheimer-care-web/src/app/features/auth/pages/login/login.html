<div class="page-wrapper">
  <div class="main-container">
    <!-- Left Section (Image) -->
    <div class="image-section">
      <div class="logo">Alzheimer Care</div>
      <img
        class="bg-img"
        src="https://images.unsplash.com/photo-1638202993928-7267aad84c31?ixlib=rb-4.0.3&auto=format&fit=crop&w=1587&q=80"
        alt="Doctor Background"
      />

      <div class="promo-card">
        <div class="promo-text">
          Secure monitoring<br />
          for peace of mind.
        </div>
      </div>
    </div>

    <!-- Right Section (Form) -->
    <div class="form-section">
      <!-- Stepper (Optional visually, kept to match design) -->
      <div class="stepper">
        <div class="step active">
          <div class="step-circle">1</div>
          Login
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-circle">2</div>
          2FA
        </div>
      </div>

      <h1 class="form-title">Welcome Back</h1>
      <div class="form-subtitle">Sign in to manage patient alerts and data.</div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="label">Email</label>
          <input
            type="email"
            class="input-field"
            formControlName="email"
            placeholder="doctor@hospital.com"
          />
        </div>

        <div class="form-group">
          <label class="label">Password</label>
          <input
            type="password"
            class="input-field"
            formControlName="password"
            placeholder="••••••••••"
          />

          <div class="forgot-row">
            <label class="remember-me">
              <input type="checkbox" formControlName="rememberMe" class="remember-checkbox" />
              <span>Remember me</span>
            </label>
            <a routerLink="/auth/forgot-password" class="forgot-link">Forgot password?</a>
          </div>
        </div>
        <div
          *ngIf="errorMessage"
          style="
            color: #dc2626;
            background-color: #fee2e2;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
          "
        >
          {{ errorMessage }}
        </div>
        <button class="submit-btn" type="submit" [disabled]="loginForm.invalid || isLoading">
          {{ isLoading ? 'Logging in...' : 'Log in' }}
        </button>
        <div class="form-group recaptcha-wrap">
  <re-captcha
    formControlName="recaptcha"
    siteKey="6LfWLoAsAAAAADs5GBuGWXl4DdEoukT1eT9YBGd3">
  </re-captcha>
</div>

        <div class="divider">
          <div class="divider-line"></div>
          <span>or continue with</span>
          <div class="divider-line"></div>
        </div>

        

        <div class="bottom-text">
          Don't have an account?
          <a routerLink="/auth/register">Create account</a>
        </div>
        
      </form>
    </div>
  </div>
</div>
