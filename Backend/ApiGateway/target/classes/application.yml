server:
  port: 8085

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: formation-service
          uri: lb://Formation
          predicates:
            - Path=/api/formation/**, /formation/**
        - id: user-service
          uri: lb://User
          predicates:
            - Path=/api/user/**, /user/**
        - id: profile-service
          uri: lb://Profile
          predicates:
            - Path=/api/profile/**, /profile/**
        - id: product-service
          uri: lb://Product
          predicates:
            - Path=/api/product/**, /product/**
        - id: alert-service
          uri: lb://Alert
          predicates:
            - Path=/api/alert/**, /alert/**
        - id: conversation-service
          uri: lb://Conversation
          predicates:
            - Path=/api/conversation/**, /conversation/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
