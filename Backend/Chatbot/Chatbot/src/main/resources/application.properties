spring.application.name=Chatbot
server.port=8099

# ============================================================
# PRIMARY DATABASE (Chatbot history storage)
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/Chatbot}
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
# EUREKA
# ============================================================
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# ============================================================
# GEMINI AI CONFIGURATION
# >>> PUT YOUR GOOGLE GEMINI API KEY HERE <<<
# ============================================================
gemini.api.key=${GEMINI_API_KEY:AIzaSyCpFwTv8o_6JVkqI8EfgGit2lOaixU5kr0}
gemini.model=gemini-2.5-flash
gemini.max-tokens=8192

# ============================================================
# MULTI-DATABASE CONNECTIONS (read-only, for querying all services)
# All databases share the same PostgreSQL instance on port 5433
# ============================================================
chatbot.db.host=${DB_HOST:localhost}
chatbot.db.port=${DB_PORT:5433}
chatbot.db.username=postgres
chatbot.db.password=123

# Database names for each microservice
chatbot.db.names=Alert,User,Patient,Conversation,Intervention,autonomy,cognitive_assessment,SensorSimulator,Profile,Product,alzheimer_stock

# ============================================================
# QUERY SAFETY
# ============================================================
chatbot.query.timeout-seconds=5
chatbot.query.max-rows=100

# ============================================================
# MONITORING
# ============================================================
management.endpoints.web.exposure.include=*
management.prometheus.metrics.export.enabled=true

# ============================================================
# SWAGGER
# ============================================================
springdoc.api-docs.path=/chatbot/v3/api-docs
