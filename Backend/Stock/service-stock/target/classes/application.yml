server:
  port: 8095

spring:
  application:
    name: SERVICE-STOCK
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/alzheimer_stock}
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: always

springdoc:
  api-docs:
    path: /stock/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: "*"
  prometheus:
    metrics:
      export:
        enabled: true

app:
  upload:
    dir: uploads
  mail:
    admin-email: admin@pharmacare.tn
  ai:
    api-key: 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
    api-url: https://openrouter.ai/api/v1/chat/completions
    model: qwen/qwen3.6-plus:free
    enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
