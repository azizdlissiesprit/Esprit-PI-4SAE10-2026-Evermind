spring.application.name=SensorSimulator
server.port=8089

# ====== Database ======
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/SensorSimulator}
spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ====== Eureka ======
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}

# ====== Simulation Configuration ======
# Interval between simulation cycles (milliseconds). Default: 10 seconds.
simulation.interval-ms=10000
# Base probability of an accident per sensor per cycle. 0.02 = 2%.
simulation.accident-probability=0.02
# Whether simulation starts automatically on application boot.
simulation.auto-start=true
# Geofence center coordinates (default: Tunis area)
simulation.geofence.center-lat=36.8065
simulation.geofence.center-lon=10.1815
# Geofence radius in meters
simulation.geofence.radius-meters=100

# ====== Logging ======
logging.level.tn.esprit.sensorsimulator=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n


management.endpoints.web.exposure.include=*
management.prometheus.metrics.export.enabled=true

springdoc.api-docs.path=/simulation/v3/api-docs
